baseurl = "https://example.com/"
title = "console-demo"
theme = "hugo-theme-console"
languageCode = "en-us"

[markup]
  [markup.highlight]
    # Settings for Code Block Highlights
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ''
    hl_inline = false
    lineAnchors = ''
    lineNoStart = 1
    lineNos = true
    lineNumbersInTable = false
    noClasses = false # To allow external css for highlight color
    style = 'emacs'
    tabWidth = 4
    wrapperClass = 'highlight'

  [markup.goldmark]
    [markup.goldmark.renderer]
        unsafe = true  # This to allow embed videos
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true  # This for math
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)'], ['$', '$']]

[taxonomies]
  category = "categories"
  tag = "tags"


[params]
  # Cutting off the page title to two chars for mobile (console-demo -> co)
  titleCutting = true

  # Set the animation style -- https://animate.style/
  # To disable animations, please remove or comment animationStyle parameter
  animateStyle = "animated zoomIn fast"

  [[params.navlinks]]
  name = "about/"
  url = "about/"

  [[params.navlinks]]
  name = "posts/"
  url = "posts/"

  [[params.navlinks]]
  name = "photos/"
  url = "photos/"
